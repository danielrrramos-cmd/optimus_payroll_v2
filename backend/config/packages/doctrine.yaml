doctrine:
    dbal:
        url: '%env(DATABASE_URL)%'
        mapping_types:
            _text: string
            _int4: integer
            _int8: integer
            _bool: boolean
            _float8: float
            _varchar: string
            _numeric: string
    orm:
        auto_generate_proxy_classes: true
        naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
        auto_mapping: true
        mappings:
            App:
                is_bundle: false
                dir: '%kernel.project_dir%/src/Entity'
                prefix: 'App\Entity'
                alias: App

doctrine_migrations:
    migrations_paths:
        'DoctrineMigrations': '%kernel.project_dir%/migrations'
