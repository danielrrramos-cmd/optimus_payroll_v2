<div class="container">

  <div class="header">
    <div class="logo-container">
      <img src="logo.png" alt="Optimus Payroll" class="logo-img">
    </div>
    <a class="logout" (click)="logout()">Cerrar sesión</a>
  </div>

  @if (user(); as u) {
    <div class="card">
      <h2>Bienvenido, {{ u.usuario }}</h2>
      <p>Panel de gestión empresarial — <strong>{{ u.empresa_nombre }}</strong></p>
    </div>

    <div class="card" style="margin-top: 16px;">
      <h3>Menú principal</h3>
      <br>
      <a routerLink="/empleados" class="btn" style="margin-right: 12px;">Gestionar empleados</a>
      <a routerLink="/nominas" class="btn">Historial de nóminas</a>
    </div>
  }

</div>
