<div class="container" style="max-width: 620px;">
  <div class="header">
    <div class="logo-container">
      <img src="logo.png" alt="Optimus Payroll" class="logo-img">
      <h2>Generar Nómina</h2>
    </div>
    <a routerLink="/empleados" class="btn-secondary">Volver</a>
  </div>

  @if (empleado(); as emp) {
    <div class="empleado-card">
      <p><strong>{{ emp.nombre }} {{ emp.apellidos }}</strong></p>
      <p>DNI: {{ emp.dni }}</p>
      <p>Salario Base: {{ +emp.salarioBase | number:'1.2-2' }} €</p>
    </div>

    <form (ngSubmit)="onSubmit()">
      <label>Mes</label>
      <select [(ngModel)]="mes" name="mes">
        @for (m of meses; track m.value) {
          <option [value]="m.value">{{ m.label }}</option>
        }
      </select>

      <label>Año</label>
      <input type="number" [(ngModel)]="anio" name="anio" min="2020" max="2035">

      @if (error) {
        <div class="error-msg" style="margin-top: 14px;">{{ error }}</div>
      }
      @if (success) {
        <div class="success" style="margin-top: 14px;">{{ success }}</div>
      }

      <div class="form-actions">
        <button type="submit" class="btn">Generar nómina</button>
        <a routerLink="/empleados" class="btn-cancel">Cancelar</a>
      </div>
    </form>
  }
</div>
