<div class="container" style="max-width: 620px;">
  <div class="header">
    <div class="logo-container">
      <img src="logo.png" alt="Optimus Payroll" class="logo-img">
      <h2>{{ isEditing ? 'Editar' : 'Nuevo' }} Empleado</h2>
    </div>
    <a routerLink="/empleados" class="btn-secondary">Volver</a>
  </div>

  @if (error) {
    <div class="error-msg">{{ error }}</div>
  }

  <form (ngSubmit)="onSubmit()">
    <label>Nombre</label>
    <input type="text" [(ngModel)]="empleado.nombre" name="nombre" required>

    <label>Apellidos</label>
    <input type="text" [(ngModel)]="empleado.apellidos" name="apellidos" required>

    <label>DNI / NIE</label>
    <input type="text" [(ngModel)]="empleado.dni" name="dni"
           (blur)="normalizarDni()"
           placeholder="Ej: 12345678A"
           required>

    <label>Salario Base (€)</label>
    <input type="number" [(ngModel)]="empleado.salarioBase" name="salarioBase"
           step="0.01" min="0.01" required>

    <label>IRPF (%)</label>
    <input type="number" [(ngModel)]="empleado.irpf" name="irpf"
           step="0.01" min="0" required>

    <label>Seguridad Social (%)</label>
    <input type="number" [(ngModel)]="empleado.seguridadSocial" name="seguridadSocial"
           step="0.01" min="0" required>

    <div class="form-actions">
      <button type="submit" class="btn" [disabled]="guardando">
        {{ guardando ? 'Guardando...' : 'Guardar' }}
      </button>
      <a routerLink="/empleados" class="btn-cancel">Cancelar</a>
    </div>
  </form>
</div>
