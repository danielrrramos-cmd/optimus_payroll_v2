<div class="container" style="max-width: 700px;">

  <div class="header">
    <div class="logo-container">
      <img src="logo.png" alt="Optimus Payroll" class="logo-img">
    </div>
    <a class="logout" (click)="logout()">Cerrar sesión</a>
  </div>

  <div class="card">
    <h2>{{ isEditing ? 'Editar empleado' : 'Crear nuevo empleado' }}</h2>

    @if (error) {
      <div style="color: #dc2626; margin-bottom: 12px;">{{ error }}</div>
    }

    <form (ngSubmit)="onSubmit()">
      <div style="margin-bottom: 14px;">
        <label style="font-weight: 500;">Nombre:</label>
        <input type="text" [(ngModel)]="empleado.nombre" name="nombre" required
               style="width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #e5e7eb; margin-top: 4px;">
      </div>

      <div style="margin-bottom: 14px;">
        <label style="font-weight: 500;">Apellidos:</label>
        <input type="text" [(ngModel)]="empleado.apellidos" name="apellidos" required
               style="width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #e5e7eb; margin-top: 4px;">
      </div>

      <div style="margin-bottom: 14px;">
        <label style="font-weight: 500;">DNI:</label>
        <input type="text" [(ngModel)]="empleado.dni" name="dni"
               (blur)="normalizarDni()"
               placeholder="Ej: 12345678A" required
               style="width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #e5e7eb; margin-top: 4px;">
      </div>

      <div style="margin-bottom: 14px;">
        <label style="font-weight: 500;">Salario Base (€):</label>
        <input type="number" [(ngModel)]="empleado.salarioBase" name="salarioBase"
               step="0.01" min="0.01" required
               style="width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #e5e7eb; margin-top: 4px;">
      </div>

      <div style="margin-bottom: 14px;">
        <label style="font-weight: 500;">IRPF (%):</label>
        <input type="number" [(ngModel)]="empleado.irpf" name="irpf"
               step="0.01" min="0" required
               style="width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #e5e7eb; margin-top: 4px;">
      </div>

      <div style="margin-bottom: 14px;">
        <label style="font-weight: 500;">Seguridad Social (%):</label>
        <input type="number" [(ngModel)]="empleado.seguridadSocial" name="seguridadSocial"
               step="0.01" min="0" required
               style="width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #e5e7eb; margin-top: 4px;">
      </div>

      <button type="submit" class="btn" style="width: 100%;" [disabled]="guardando">
        {{ guardando ? 'Guardando...' : (isEditing ? 'Actualizar' : 'Guardar') }}
      </button>
    </form>

    <br>
    <a routerLink="/empleados">← Volver al listado</a>
  </div>

</div>
