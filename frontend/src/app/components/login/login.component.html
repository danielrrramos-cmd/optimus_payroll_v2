<div class="login-wrapper">
  <div class="login-container">
    <div class="logo-area">
      <img src="logo.png" alt="Optimus Payroll" class="login-logo">
    </div>

    <div class="login-card">
      <h2>Iniciar sesión</h2>
      <form (ngSubmit)="onSubmit()">
        <label for="usuario">Usuario</label>
        <input type="text" id="usuario" [(ngModel)]="usuario" name="usuario"
               placeholder="Introduce tu usuario" required>

        <label for="password">Contraseña</label>
        <input type="password" id="password" [(ngModel)]="password" name="password"
               placeholder="Introduce tu contraseña" required>

        @if (error) {
          <div class="error-msg" style="margin-top: 12px;">{{ error }}</div>
        }

        <button type="submit" class="btn" style="width: 100%; margin-top: 20px;">
          Entrar
        </button>
      </form>
    </div>
  </div>
</div>
